# ============================================================
#  pytest.ini — Configuración de pytest
# ============================================================

[pytest]
# Directorio donde buscar tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marcadores personalizados
markers =
    unit: Tests unitarios sin conexiones reales (rápidos, sin dependencias externas)
    integration: Tests de integración con MySQL y PrestaShop reales (requieren .env)
    api: Tests de los endpoints FastAPI (requieren servidor en memoria)

# Opciones por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Modo asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
